  <style>
    :root {
      --bg: #0a0a0a;
      --card-bg: #141414;
      --border: rgba(255,255,255,0.07);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --accent: #a5b4fc;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
    }
    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
    }
    .type-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 7px;
      border-radius: 12px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .type-normal { background: #A8A878; color: white; }
    .type-fire { background: #F08030; color: white; }
    .type-water { background: #6890F0; color: white; }
    .type-grass { background: #78C850; color: white; }
    .type-electric { background: #F8D030; color: #333; }
    .type-ice { background: #98D8D8; color: #333; }
    .type-fighting { background: #C03028; color: white; }
    .type-poison { background: #A040A0; color: white; }
    .type-ground { background: #E0C068; color: #333; }
    .type-flying { background: #A890F0; color: white; }
    .type-psychic { background: #F85888; color: white; }
    .type-bug { background: #A8B820; color: white; }
    .type-rock { background: #B8A038; color: white; }
    .type-ghost { background: #705898; color: white; }
    .type-dragon { background: #7038F8; color: white; }
    .type-dark { background: #705848; color: white; }
    .type-steel { background: #B8B8D0; color: #333; }
    .type-fairy { background: #EE99AC; color: white; }
    .stat-bar {
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .stat-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #a5b4fc);
      border-radius: 2px;
    }
    .tooltip {
      position: fixed;
      background: rgba(12, 12, 20, 0.97);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 8px;
      padding: 12px;
      z-index: 9999;
      pointer-events: none;
      min-width: 200px;
      max-width: 290px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.85);
    }
    .scroll-h { overflow-x: auto; }
    .scroll-h::-webkit-scrollbar { height: 6px; }
    .scroll-h::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 3px; }
    .scroll-h::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 3px; }
    .sprite-box {
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sprite-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .sprite-box-sm {
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sprite-box-sm img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .move-select {
      width: 100%;
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      color: #e2e8f0;
      font-size: 0.65rem;
      border-radius: 4px;
      padding: 2px 4px;
      appearance: none;
    }
    .move-select:focus { outline: 1px solid #6366f1; }
    .poke-picker {
      max-height: 110px;
      overflow-y: auto;
      background: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
    }
    .poke-picker::-webkit-scrollbar { width: 3px; }
    .poke-picker::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.5); border-radius: 2px; }
    .btn-primary {
      background: #6366f1;
      color: white;
      font-size: 0.7rem;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #4f46e5; }
    .btn-danger {
      background: rgba(220,38,38,0.7);
      color: white;
      font-size: 0.7rem;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .btn-danger:hover { background: rgba(220,38,38,0.9); }
    .tab-active { background: #6366f1 !important; color: white !important; }
    .filter-active { background: #6366f1 !important; color: white !important; }
    .tracker-panel { height: calc(100vh - 160px); overflow-y: auto; }
    .tracker-panel::-webkit-scrollbar { width: 4px; }
    .tracker-panel::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.4); border-radius: 2px; }
    .turns-col { height: calc(100vh - 160px); overflow-y: auto; padding-right: 4px; }
    .turns-col::-webkit-scrollbar { width: 4px; }
    .turns-col::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.4); border-radius: 2px; }
  </style>

    function getSpriteUrl(pokemon) {
      const slug = pokemon.sdSlug || pokemon.slug;
      return `https://play.pokemonshowdown.com/sprites/ani/${slug}.gif`;
    }

    function TypeBadge({ type }) {
      return <span className={`type-badge type-${type.toLowerCase()}`}>{type}</span>;
    }

    function usePokemon(slug) {
      const [data, setData] = useState(pokemonCache[slug] || null);
      const [loading, setLoading] = useState(false);
      useEffect(() => {
        if (!slug) return;
        if (pokemonCache[slug]) { setData(pokemonCache[slug]); return; }
        setLoading(true);
        fetch(`https://pokeapi.co/api/v2/pokemon/${slug}`)
          .then(r => r.json())
          .then(d => { pokemonCache[slug] = d; setData(d); setLoading(false); })
          .catch(() => setLoading(false));
      }, [slug]);
      return { data, loading };
    }

    function getDefMatchups(types) {
      const weaknesses = [], resistances = [], immunities = [];
      TYPES.forEach((attackType, attIdx) => {
        let mult = 1;
        types.forEach(defType => {
          const defIdx = TYPES.indexOf(defType);
          if (defIdx !== -1) mult *= TYPE_CHART[attIdx][defIdx];
        });
        if (mult === 0) immunities.push(attackType);
        else if (mult >= 4) weaknesses.push({ type: attackType, mult: 4 });
        else if (mult >= 2) weaknesses.push({ type: attackType, mult: 2 });
        else if (mult <= 0.25) resistances.push({ type: attackType, mult: 0.25 });
        else if (mult <= 0.5) resistances.push({ type: attackType, mult: 0.5 });
      });
      return { weaknesses, resistances, immunities };
    }

      if (loading && !data) {
        return (
          <div className="tooltip" style={{ left, top }}>
            <div className="text-xs text-gray-400">Loading…</div>
          </div>
        );

      if (!data) return null;

      const statNames = ['HP','Atk','Def','SpA','SpD','Spe'];

      const [moveTypes, setMoveTypes] = useState([null,null,null,null]);
      const [tick, setTick] = useState(0);
      const sortedItems = useMemo(() => [...ITEMS].sort((a,b) => a.name.localeCompare(b.name)), []);
      const allMoves = useMemo(() => apiData ? [...new Set(apiData.moves.map(m => m.move.name))].sort() : [], [apiData]);
      const abilities = useMemo(() => apiData ? apiData.abilities.map(a => ({ name: a.ability.name, hidden: a.is_hidden })) : [], [apiData]);
      const filteredRoster = useMemo(() => {
        if (!pokeSearch.trim()) return [];
        return ROSTER.filter(p => p.name.toLowerCase().includes(pokeSearch.toLowerCase())).slice(0, 12);
      }, [pokeSearch]);

      useEffect(() => {
        moves.forEach((moveName, i) => {
          if (!moveName) { setMoveTypes(prev => { const n=[...prev]; n[i]=null; return n; }); return; }
          if (moveTypeCache[moveName]) { setMoveTypes(prev => { const n=[...prev]; n[i]=moveTypeCache[moveName]; return n; }); return; }
          fetch(`https://pokeapi.co/api/v2/move/${moveName}`).then(r=>r.json()).then(d=>{moveTypeCache[moveName]=d.type.name;setTick(t=>t+1);}).catch(()=>{});
        });
      }, [moves]);
      useEffect(() => { setMoveTypes(moves.map(m => m ? (moveTypeCache[m]||null) : null)); }, [tick, moves]);

      useEffect(() => {
        if (abilities.length > 0 && !ability && onSetAbility) {
          const first = abilities.find(a => !a.hidden) || abilities[0];
          onSetAbility(first.name);
        }
      }, [abilities.length]);

      return (
        <div className="card p-2 rounded text-center" style={{minWidth:0}}>
          <div className="text-xs font-semibold mb-1" style={{color:'#64748b'}}>Slot {idx+1}</div>
          {mon ? (
            <>
              <div className="sprite-box mx-auto mb-1"><img src={getSpriteUrl(mon)} alt={mon.name} loading="lazy" /></div>
              <div className="font-bold text-xs mb-1">{mon.name}</div>
              <div className="flex gap-1 justify-center mb-2 flex-wrap">{mon.types.map(t => <TypeBadge key={t} type={t} />)}</div>
              {abilities.length > 0 && (
                <div className="mb-2">
                  <select value={ability||''} onChange={e=>onSetAbility(e.target.value)} className="w-full px-1 py-1 bg-gray-900 text-white text-xs rounded border border-gray-700 mb-1">
                    <option value="">— Talent —</option>
                    {abilities.map(a => <option key={a.name} value={a.name}>{a.hidden?'◇ ':'⚡ '}{a.name.replace(/-/g,' ')}</option>)}
                  </select>
                  {ability && (() => {
                    const immuneTypes = ABILITY_IMMUNITIES[ability]||[];
                    const mods = ABILITY_MODIFIERS[ability]||{};
                    if (!immuneTypes.length && !Object.keys(mods).length) return null;
                    return <div className="flex flex-wrap gap-1 items-center">
                      {immuneTypes.map(t=><span key={t} className="inline-flex items-center gap-0.5 text-xs" style={{color:'#93c5fd'}}>✗<TypeBadge type={t}/></span>)}
                      {Object.entries(mods).map(([t,m])=><span key={t} className="inline-flex items-center gap-0.5 text-xs" style={{color:m<1?'#86efac':'#fca5a5'}}>{m<1?'½':'2×'}<TypeBadge type={t}/></span>)}
                    </div>;
                  })()}
                </div>
              )}
              <select value={item||""} onChange={e=>onSetItem(e.target.value)} className="w-full px-1 py-1 bg-gray-900 text-white text-xs rounded border border-gray-700 mb-2">
                <option value="">— No Item —</option>
                {sortedItems.map(it=><option key={it.name} value={it.name}>{it.name}</option>)}
              </select>
              <div className="space-y-1 mb-2">
                {[0,1,2,3].map(mi=>(
                  <div key={mi} className="flex items-center gap-1">
                    <select value={moves[mi]||""} onChange={e=>{const nm=[...moves];nm[mi]=e.target.value;onSetMoves(nm);}} className="move-select flex-1">
                      <option value="">Move {mi+1}…</option>
                      {allMoves.map(m=><option key={m} value={m}>{m.replace(/-/g,' ')}</option>)}
                    </select>
                    {moveTypes[mi] && <TypeBadge type={moveTypes[mi]}/>}
                  </div>
                ))}
              </div>
              <button onClick={onRemove} className="btn-danger w-full">Remove</button>
            </>
          ) : (
            <div>
              <div style={{color:'#374151',fontSize:'0.7rem'}} className="mb-2">— Empty —</div>
              <input type="text" placeholder="Search Pokémon…" value={pokeSearch} onChange={e=>setPokeSearch(e.target.value)} className="w-full px-2 py-1 bg-gray-900 text-white text-xs rounded border border-gray-700 mb-1 focus:outline-none focus:border-indigo-500"/>
              {filteredRoster.length>0&&<div className="poke-picker mb-1">
                {filteredRoster.map(p=><div key={p.slug} className="px-2 py-1 text-xs cursor-pointer hover:bg-indigo-800 text-left" style={{color:'#cbd5e1'}} onClick={()=>{onSelect(p);setPokeSearch('');}}>{p.name}</div>)}
              </div>}
            </div>
          )}
        </div>
      );
    }

    function TeambuilderTab({ team, setTeam, onHoverPokemon, tooltipData, moveSelectors, setMoveSelectors, abilitySelectors, setAbilitySelectors }) {
      const [itemSelectors, setItemSelectors] = useState(Array(6).fill(null));

      const removeFromTeam = i => {
        const t=[...team]; t[i]=null; setTeam(t);
        const m=[...moveSelectors]; m[i]=['','','','']; setMoveSelectors(m);
        const a=[...abilitySelectors]; a[i]=''; setAbilitySelectors(a);
      };
      const setInTeam = (i, p) => {
        const t=[...team]; t[i]=p; setTeam(t);
        const m=[...moveSelectors]; m[i]=['','','','']; setMoveSelectors(m);
        const a=[...abilitySelectors]; a[i]=''; setAbilitySelectors(a);
      };
      const setItem = (i, v) => { const n=[...itemSelectors]; n[i]=v; setItemSelectors(n); };
      const setMoves = (i, v) => { const n=[...moveSelectors]; n[i]=v; setMoveSelectors(n); };
      const setAbility = (i, v) => { const n=[...abilitySelectors]; n[i]=v; setAbilitySelectors(n); };

      const typeMatchups = useMemo(() => {
        return TYPES.map((type, typeIdx) => {
          const slotData = team.map((mon, slotIdx) => {
            if (!mon) return null;
            const selAbility = abilitySelectors[slotIdx];
            // 1. Ability immunity overrides everything
            if (selAbility && (ABILITY_IMMUNITIES[selAbility]||[]).includes(type)) return 0;
            // 2. Type-chart effectiveness
            let mult = 1;
            mon.types.forEach(mt => { mult *= TYPE_CHART[typeIdx][TYPES.indexOf(mt)]; });
            // 3. Ability modifier (Thick Fat etc.)
            const abilityMod = selAbility ? ((ABILITY_MODIFIERS[selAbility]||{})[type] ?? 1) : 1;
            return mult * abilityMod;
          });
          const weakCount = slotData.filter(m => m !== null && m >= 2).length;
          const score = slotData.reduce((acc, m) => {
            if (m === null) return acc;
            if (m === 0) return acc + 2;
            if (m <= 0.25) return acc + 2;
            if (m <= 0.5) return acc + 1;
            if (m >= 4) return acc - 2;
            if (m >= 2) return acc - 1;
            return acc;
          }, 0);
          return { type, slotData, weakCount, score };
        });
      }, [team, abilitySelectors]);

      const suggestions = useMemo(() => {
        const teamSlugs = team.filter(Boolean).map(p => p.slug);
        if (teamSlugs.length === 0) return ROSTER.slice(0, 8).map(p => ({pokemon:p,score:0}));

        return ROSTER
          .filter(p => !teamSlugs.includes(p.slug))
          .map(p => {
            let score = 0;
            TYPES.forEach((type, typeIdx) => {
              const teamScore = typeMatchups[typeIdx].score; // ± balance of existing team
              let candMult = 1;
              p.types.forEach(pt => { candMult *= TYPE_CHART[typeIdx][TYPES.indexOf(pt)]; });
              if (candMult === 0)       { score += teamScore < 0 ? 4 : 1; }     // immune
              else if (candMult <= 0.25){ if (teamScore < 0) score += 3; }      // ×0.25
              else if (candMult <= 0.5) { if (teamScore < 0) score += 2; }      // ×0.5
              else if (candMult >= 4)   { if (teamScore < 0) score -= 4; }      // ×4 shared
              else if (candMult >= 2)   { if (teamScore < 0) score -= 2; }      // ×2 shared
            });
            return { pokemon: p, score };
          })
          .sort((a,b) => b.score - a.score)
          .slice(0, 8);
      }, [team, typeMatchups]);

      const offensiveMoveTypes = useMemo(() => {
        return team.map((mon, idx) => {
          if (!mon) return null;
          const types = (moveSelectors[idx]||[]).map(m => m ? moveTypeCache[m] : null).filter(Boolean);
          return { mon, types };
        });
      }, [team, moveSelectors]);

      const activeCovMons = offensiveMoveTypes.filter(c => c && c.types.length > 0);
      const hasCoverage = activeCovMons.length > 0;

      // Coverage rows: per defending type, best mult per Pokémon + row score
      const coverageRows = useMemo(() => {
        return TYPES.map(defType => {
          const defIdx = TYPES.indexOf(defType);
          const perMon = activeCovMons.map(({ mon, types }) => {
            let best = 0;
            types.forEach(att => { const ai=TYPES.indexOf(att); if(ai!==-1){const m=TYPE_CHART[ai][defIdx];if(m>best)best=m;} });
            return { mon, bestMult: best };
          });
          const score = perMon.reduce((sum,{bestMult:m}) => {
            if(m>=4) return sum+2; if(m>=2) return sum+1; if(m>0&&m<=0.5) return sum-1; return sum;
          },0);
          return { defType, perMon, score };
        });
      }, [activeCovMons]);

      const filledTeam = team.filter(Boolean);

      // ── Shared cell renderers ──────────────────────────────────────────────
      const defCell = (mult, idx) => {
        let bg='#1a1a1a',label='—',col='#4b5563';
        if(mult!==null){
          if(mult===0)     {bg='#1e3a5f';label='✗';col='#93c5fd';}
          else if(mult<=0.25){bg='#0f3b3b';label='¼';col='#5eead4';}
          else if(mult<=0.5){bg='#14341a';label='½';col='#86efac';}
          else if(mult>=4) {bg='#4a0000';label='4×';col='#fca5a5';}
          else if(mult>=2) {bg='#3b1a00';label='2×';col='#fdba74';}
          else             {bg='#1a1a1a';label='1';col='#4b5563';}
        }
        return <td key={idx} className="p-1.5 text-center border-l font-mono" style={{background:bg,borderColor:'rgba(255,255,255,0.04)',color:col}}>{label}</td>;
      };
      const scoreCol = (score) => {
        const col=score>0?'#4ade80':score<0?'#f87171':'#4b5563';
        return <td className="p-1.5 text-center border-l font-bold font-mono" style={{borderColor:'rgba(255,255,255,0.04)',color:col,minWidth:'36px'}}>{score!==0?(score>0?'+':'')+score:''}</td>;
      };
      const defTableHalf = (rows) => (
        <div className="scroll-h flex-1 min-w-0">
          <table className="text-xs border-collapse" style={{minWidth:'max-content'}}>
            <thead><tr>
              <th className="p-1.5 text-left sticky left-0 z-10" style={{background:'#0a0a0a',minWidth:'68px'}}>Atk</th>
              {team.map((mon,i)=><th key={i} className="p-1.5 text-center border-l" style={{background:'#0a0a0a',borderColor:'rgba(255,255,255,0.06)',minWidth:'52px'}}><div className="truncate text-xs" title={mon?mon.name:'—'}>{mon?mon.name.split(' ')[0]:'—'}</div></th>)}
              <th className="p-1.5 text-center border-l" style={{background:'#0a0a0a',borderColor:'rgba(255,255,255,0.06)',minWidth:'36px',color:'#a5b4fc'}}>±</th>
            </tr></thead>
            <tbody>
              {rows.map(({type,slotData,score:s})=>(
                <tr key={type} className="border-t" style={{borderColor:'rgba(255,255,255,0.04)'}}>
                  <td className="p-1.5 sticky left-0 z-10" style={{background:'#0d0d0d'}}><TypeBadge type={type}/></td>
                  {slotData.map((mult,i)=>defCell(mult,i))}
                  {scoreCol(s)}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
      const covCell = (bestMult,i) => {
        let bg='#1a1a1a',label='—',col='#4b5563';
        if(bestMult>=4)           {bg='#14341a';label='4×';col='#4ade80';}
        else if(bestMult>=2)      {bg='#0f2e1a';label='2×';col='#86efac';}
        else if(bestMult>0&&bestMult<=0.5){bg='#3b1a1a';label='½';col='#f87171';}
        else if(bestMult===0)     {bg='#1e3a5f';label='✗';col='#93c5fd';}
        else if(bestMult===1)     {bg='#1a1a1a';label='1';col='#4b5563';}
        return <td key={i} className="p-1.5 text-center border-l font-mono" style={{background:bg,borderColor:'rgba(255,255,255,0.04)',color:col}}>{label}</td>;
      };
      const covTableHalf = (rows) => (
        <div className="scroll-h flex-1 min-w-0">
          <table className="text-xs border-collapse" style={{minWidth:'max-content'}}>
            <thead><tr>
              <th className="p-1.5 text-left sticky left-0 z-10" style={{background:'#0a0a0a',minWidth:'68px'}}>Def</th>
              {activeCovMons.map(({mon},i)=><th key={i} className="p-1.5 text-center border-l" style={{background:'#0a0a0a',borderColor:'rgba(255,255,255,0.06)',minWidth:'52px'}}><div className="truncate text-xs">{mon.name.split(' ')[0]}</div></th>)}
              <th className="p-1.5 text-center border-l" style={{background:'#0a0a0a',borderColor:'rgba(255,255,255,0.06)',minWidth:'36px',color:'#a5b4fc'}}>±</th>
            </tr></thead>
            <tbody>
              {rows.map(({defType,perMon,score:s})=>(
                <tr key={defType} className="border-t" style={{borderColor:'rgba(255,255,255,0.04)'}}>
                  <td className="p-1.5 sticky left-0 z-10" style={{background:'#0d0d0d'}}><TypeBadge type={defType}/></td>
                  {perMon.map(({bestMult},i)=>covCell(bestMult,i))}
                  {scoreCol(s)}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );

      return (
        <div className="space-y-8">
          <div>
            <h3 className="text-lg font-bold mb-3" style={{color:'#a5b4fc'}}>Your Team</h3>
            <div className="grid gap-3" style={{gridTemplateColumns:'repeat(auto-fit,minmax(155px,1fr))'}}>
              {team.map((mon, idx) => (
                <TeamSlot
                  key={idx}
                  mon={mon} idx={idx}
                  onRemove={() => removeFromTeam(idx)}
                  onSelect={p => setInTeam(idx, p)}
                  item={itemSelectors[idx]}
                  onSetItem={v => setItem(idx, v)}
                  moves={moveSelectors[idx] || ['','','','']}
                  onSetMoves={v => setMoves(idx, v)}
                  ability={abilitySelectors[idx]}
                  onSetAbility={v => setAbility(idx, v)}
                />
              ))}
            </div>
          </div>

          {filledTeam.length > 0 && (
            <div>
              <h3 className="text-lg font-bold mb-1" style={{color:'#a5b4fc'}}>Defensive Coverage</h3>
              <p className="text-xs mb-3" style={{color:'#64748b'}}>± score: immune +2 · ×0.25 +2 · ×0.5 +1 · ×2 −1 · ×4 −2</p>
              <div className="flex gap-4 flex-wrap">
                {defTableHalf(typeMatchups.slice(0,9))}
                {defTableHalf(typeMatchups.slice(9))}
              </div>
              <div className="flex flex-wrap gap-3 mt-2 text-xs" style={{color:'#64748b'}}>
                <span><span style={{color:'#93c5fd'}}>✗</span> Immune</span>
                <span><span style={{color:'#5eead4'}}>¼</span></span>
                <span><span style={{color:'#86efac'}}>½</span></span>
                <span style={{color:'#4b5563'}}>1 Neutral</span>
                <span><span style={{color:'#fdba74'}}>2×</span></span>
                <span><span style={{color:'#fca5a5'}}>4×</span></span>
              </div>
            </div>
          )}

          {hasCoverage && (
            <div>
              <h3 className="text-lg font-bold mb-1" style={{color:'#a5b4fc'}}>Offensive Coverage</h3>
              <p className="text-xs mb-3" style={{color:'#64748b'}}>Best move vs each defending type · ± score: 4× +2 · 2× +1 · ½ −1</p>
              <div className="flex gap-4 flex-wrap">
                {covTableHalf(coverageRows.slice(0,9))}
                {covTableHalf(coverageRows.slice(9))}
              </div>
            </div>
          )}

          <div>
            <h3 className="text-lg font-bold mb-1" style={{color:'#a5b4fc'}}>Suggested Pokémon</h3>
            {filledTeam.length > 0 && (
              <p className="text-xs mb-3" style={{color:'#64748b'}}>Score relatif à l'équipe · Couvre une faille: immune +4 · ½ +2 · Aggrave une faille: ×2 −2 · ×4 −4</p>
            )}
            <div className="grid gap-2" style={{gridTemplateColumns:'repeat(auto-fill,minmax(110px,1fr))'}}>
              {suggestions.map(({ pokemon, score }) => (
                <div
                  key={pokemon.slug}
                  className="card p-2 rounded cursor-pointer text-center transition-all hover:border-indigo-500"
                  onMouseEnter={e => onHoverPokemon(pokemon, e)}
                  onMouseLeave={() => onHoverPokemon(null)}
                >
                  <div className="sprite-box mx-auto mb-1">
                    <img src={getSpriteUrl(pokemon)} alt={pokemon.name} loading="lazy" />
                  </div>
                  <div className="text-xs font-bold mb-1">{pokemon.name}</div>
                  {filledTeam.length > 0 && (
                    <div className="text-xs mb-1" style={{color:'#a5b4fc'}}>Score {score}</div>
                  )}
                  <button
                    onClick={() => {
                      const idx = team.findIndex(p => !p);
                      if (idx !== -1) { const t=[...team]; t[idx]=pokemon; setTeam(t); }
                    }}
                    className="btn-primary w-full"
                  >+ Add</button>
                </div>
              ))}
            </div>
          </div>

          {tooltipData && <PokemonTooltip pokemon={tooltipData.pokemon} mousePos={tooltipData.mousePos} />}
        </div>
      );
    }

    function ItemsTab() {
      const [search, setSearch] = useState("");
      const [cat, setCat] = useState("All");
      const categories = ["All","Berry","Choice","Damage","Bulk","Survival","Stat Boost","Mega Stone","Recovery","Reactive","Status","Utility"];

      const filtered = useMemo(() => ITEMS.filter(item => {
        const ms = item.name.toLowerCase().includes(search.toLowerCase());
        const mc = cat === "All" || item.category === cat;
        return ms && mc;
      }), [search, cat]);

      return (
        <div className="space-y-4">
          <input
            type="text"
            placeholder="Search items…"
            value={search}
            onChange={e => setSearch(e.target.value)}
            className="w-full px-4 py-2 bg-gray-900 text-white rounded border border-gray-700 focus:outline-none focus:border-indigo-500 text-sm"
          />
          <div className="flex flex-wrap gap-1.5">
            {categories.map(c => (
              <button key={c} onClick={() => setCat(c)}
                className={`px-2.5 py-1 rounded text-xs font-semibold transition-all ${cat===c ? 'filter-active' : 'bg-gray-800 text-gray-300 hover:bg-gray-700'}`}>
                {c}
              </button>
            ))}
          </div>
          <div className="grid gap-2" style={{gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))'}}>
            {filtered.map(item => (
              <div key={item.name} className="card p-3 rounded text-center">
                <div className="h-10 flex items-center justify-center mb-2">
                  {item.itemSprite !== "null" ? (
                    <img
                      src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/${item.itemSprite}.png`}
                      alt={item.name} className="w-8 h-8"
                      onError={e => { e.target.style.display='none'; }}
                    />
                  ) : <span className="text-xl">✨</span>}
                </div>
                <div className="text-xs font-bold mb-1">{item.name}</div>
                <div className="text-xs bg-gray-800 px-2 py-0.5 rounded inline-block mb-1" style={{color:'#a5b4fc'}}>{item.category}</div>
                <div className="text-xs" style={{color:'#94a3b8'}}>{item.effect}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

      const [cat, setCat] = useState("All");
      const categories = ["All","Weather","Trick Room","Setup","Offensive","Support"];
      const filtered = useMemo(() =>
        SYNERGIES.filter(s => cat==="All" || s.category===cat), [cat]
      );

      return (
        <div className="space-y-4">
          <div className="flex flex-wrap gap-1.5">
            {categories.map(c => (
              <button key={c} onClick={() => setCat(c)}
                className={`px-2.5 py-1 rounded text-xs font-semibold transition-all ${cat===c ? 'filter-active' : 'bg-gray-800 text-gray-300 hover:bg-gray-700'}`}>
                {c}
              </button>

              const coreMons = ROSTER.filter(p => synergy.cores.includes(p.name));
              const partnerMons = ROSTER.filter(p => synergy.partners.includes(p.name));

                <div key={synergy.id} className="card p-4 rounded border-l-4" style={{borderLeftColor:'#6366f1'}}>
                  <div className="flex justify-between items-start mb-1">
                    <div>
                      <h4 className="text-sm font-bold text-white">{synergy.name}</h4>
                      <div className="text-xs" style={{color:'#6366f1'}}>{synergy.category}</div>
                    </div>
                    {synergy.usage && (
                      <div className="text-sm font-semibold" style={{color:'#a5b4fc'}}>{synergy.usage}%</div>
                    )}
                  </div>
                  <p className="text-xs mb-3" style={{color:'#94a3b8'}}>{synergy.blurb}</p>
                  <div className="mb-2">
                    <div className="text-xs font-semibold mb-1" style={{color:'#64748b'}}>Core:</div>
                    <div className="flex gap-2 flex-wrap">
                      {coreMons.map(p => (
                        <div key={p.slug} className="cursor-pointer hover:opacity-80"
                          onMouseEnter={e => onHoverPokemon(p, e)}
                          onMouseLeave={() => onHoverPokemon(null)}>
                          <div className="sprite-box-sm"><img src={getSpriteUrl(p)} alt={p.name} loading="lazy" title={p.name} /></div>
                          <div className="text-xs text-center" style={{color:'#94a3b8',fontSize:'0.6rem'}}>{p.name}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                  {partnerMons.length > 0 && (
                    <div>
                      <div className="text-xs font-semibold mb-1" style={{color:'#64748b'}}>Partners:</div>
                      <div className="flex gap-2 flex-wrap">
                        {partnerMons.map(p => (
                          <div key={p.slug} className="cursor-pointer hover:opacity-80"
                            onMouseEnter={e => onHoverPokemon(p, e)}
                            onMouseLeave={() => onHoverPokemon(null)}>
                            <div className="sprite-box-sm"><img src={getSpriteUrl(p)} alt={p.name} loading="lazy" title={p.name} /></div>
                            <div className="text-xs text-center" style={{color:'#94a3b8',fontSize:'0.6rem'}}>{p.name}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          {tooltipData && <PokemonTooltip pokemon={tooltipData.pokemon} mousePos={tooltipData.mousePos} />}
        </div>
      );
    }

    function toTrackerSlug(name) {
      const found = ROSTER.find(p => p.name.toLowerCase() === name.toLowerCase());
      return found ? (found.sdSlug || found.slug) : name.toLowerCase().replace(/\s+/g, '-').replace(/[()]/g, '');
    }

    function TrackerSprite({ name, size=36 }) {
      const slug = toTrackerSlug(name);
      const url = `https://play.pokemonshowdown.com/sprites/ani/${slug}.gif`;
      return (
        <div style={{width: size, height: size, display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden'}}>
          <img src={url} alt={name} loading="lazy" onError={e => { e.target.style.display='none'; }} style={{maxWidth:'100%', maxHeight:'100%', imageRendering:'pixelated'}} />
        </div>
      );
    }

    function TrackerPokeSlot({ entry, onUpdate, onRemove }) {
      // Search state for the Pokémon name picker (like TeamSlot)
      const [nameSearch, setNameSearch] = useState('');
      const [showPicker, setShowPicker] = useState(false);
      const [abilityDropdown, setAbilityDropdown] = useState(false);

      // Sync nameSearch with entry.name when it changes externally (e.g. import)
      useEffect(() => { setNameSearch(''); }, [entry.name]);

      // Fetch abilities once a valid ROSTER name is set
      const rosterSlug = useMemo(() => {
        const found = ROSTER.find(p => p.name.toLowerCase() === (entry.name||'').toLowerCase());
        return found ? (found.sdSlug || found.slug) : null;
      }, [entry.name]);
      const { data: apiData } = usePokemon(rosterSlug);
      const abilities = useMemo(() =>
        apiData ? apiData.abilities.map(a => ({ name: a.ability.name, hidden: a.is_hidden })) : [],
      [apiData]);

      // Filter ROSTER suggestions while typing
      const suggestions = useMemo(() => {
        if (!nameSearch.trim()) return [];
        return ROSTER.filter(p => p.name.toLowerCase().includes(nameSearch.toLowerCase())).slice(0, 10);
      }, [nameSearch]);

      const selectPokemon = (p) => {
        onUpdate({ ...entry, name: p.name });
        setNameSearch('');
        setShowPicker(false);
      };

      const clearPokemon = () => {
        onUpdate({ ...entry, name: '', ability: '', moves: ['','','',''], ko: false });
        setNameSearch('');
      };

      return (
        <div className="card p-2 rounded text-xs" style={{marginBottom:'8px', opacity: entry.ko ? 0.65 : 1, borderColor: entry.ko ? 'rgba(220,38,38,0.45)' : 'rgba(255,255,255,0.07)'}}>
          {/* Header: sprite + name search + KO */}
          <div style={{display:'flex', gap:6, alignItems:'center', marginBottom:6}}>
            <TrackerSprite name={entry.name} size={32} />
            <div style={{flex:1, minWidth:0, position:'relative'}}>
              {entry.name ? (
                /* Name is set — show it as a tag with a clear button */
                <div style={{display:'flex', alignItems:'center', gap:4, background:'#0f0f0f', border:'1px solid rgba(99,102,241,0.3)', borderRadius:4, padding:'2px 6px'}}>
                  <span style={{flex:1, fontSize:'0.7rem', color:'#f1f5f9', fontWeight:600}}>{entry.name}</span>
                  <button onClick={clearPokemon} style={{background:'none', border:'none', color:'#64748b', cursor:'pointer', fontSize:12, padding:0, lineHeight:1}}>×</button>
                </div>
              ) : (
                /* Search mode */
                <div>
                  <input
                    type="text"
                    placeholder="Search Pokémon…"
                    value={nameSearch}
                    onChange={e => { setNameSearch(e.target.value); setShowPicker(true); }}
                    onFocus={() => setShowPicker(true)}
                    onBlur={() => setTimeout(() => setShowPicker(false), 150)}
                    style={{width:'100%', background:'#0f0f0f', border:'1px solid rgba(255,255,255,0.1)', borderRadius:4, color:'#f1f5f9', fontSize:'0.7rem', padding:'3px 6px'}}
                  />
                  {showPicker && suggestions.length > 0 && (
                    <div style={{position:'absolute', top:'100%', left:0, right:0, background:'#141428', border:'1px solid rgba(99,102,241,0.35)', borderRadius:4, zIndex:200, maxHeight:120, overflowY:'auto'}}>
                      {suggestions.map(p => (
                        <div key={p.slug} onMouseDown={() => selectPokemon(p)}
                          style={{padding:'4px 8px', cursor:'pointer', borderBottom:'1px solid rgba(255,255,255,0.04)', color:'#cbd5e1', fontSize:'0.7rem', display:'flex', alignItems:'center', gap:6}}
                          onMouseEnter={e=>e.currentTarget.style.background='rgba(99,102,241,0.2)'}
                          onMouseLeave={e=>e.currentTarget.style.background=''}
                        >
                          <TrackerSprite name={p.name} size={20} />
                          {p.name}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
            <button onClick={() => onUpdate({...entry, ko: !entry.ko})}
              style={{padding:'2px 6px', background: entry.ko ? 'rgba(220,38,38,0.7)' : 'rgba(99,102,241,0.3)', color:'white', border:'none', borderRadius:4, cursor:'pointer', fontSize:'0.65rem', flexShrink:0}}>
              {entry.ko ? '✕ KO' : '● Live'}
            </button>
          </div>

          {/* Ability */}
          <div style={{position:'relative', marginBottom:4}}>
            <input
              type="text"
              placeholder="Ability…"
              value={entry.ability}
              onChange={e => onUpdate({...entry, ability: e.target.value})}
              onFocus={() => setAbilityDropdown(true)}
              onBlur={() => setTimeout(() => setAbilityDropdown(false), 150)}
              style={{width:'100%', background:'#0f0f0f', border:'1px solid rgba(255,255,255,0.08)', borderRadius:4, color:'#cbd5e1', fontSize:'0.65rem', padding:'2px 6px'}}
            />
            {abilityDropdown && abilities.length > 0 && (
              <div style={{position:'absolute', top:'100%', left:0, right:0, background:'#0f0f0f', border:'1px solid rgba(255,255,255,0.08)', borderRadius:4, zIndex:100, maxHeight:80, overflowY:'auto'}}>
                {abilities.map(a => (
                  <div key={a.name} onMouseDown={() => { onUpdate({...entry, ability: a.name.replace(/-/g,' ')}); setAbilityDropdown(false); }}
                    style={{padding:'3px 8px', cursor:'pointer', borderBottom:'1px solid rgba(255,255,255,0.04)', color:'#cbd5e1', fontSize:'0.65rem'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(99,102,241,0.2)'}
                    onMouseLeave={e=>e.currentTarget.style.background=''}>
                    {a.hidden ? '◇ ' : '⚡ '}{a.name.replace(/-/g,' ')}
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Moves */}
          <div style={{display:'flex', flexDirection:'column', gap:3, marginBottom:6}}>
            {[0,1,2,3].map(i => (
              <input key={i} type="text" placeholder={`Move ${i+1}…`} value={entry.moves[i]||''}
                onChange={e => { const nm=[...entry.moves]; nm[i]=e.target.value; onUpdate({...entry, moves:nm}); }}
                style={{width:'100%', background:'#0f0f0f', border:'1px solid rgba(255,255,255,0.06)', borderRadius:3, color:'#94a3b8', fontSize:'0.65rem', padding:'2px 5px'}} />
            ))}
          </div>
          <button onClick={() => onRemove()} className="btn-danger w-full" style={{fontSize:'0.65rem', padding:'2px'}}>Remove</button>
        </div>
      );
    }

    function ActiveSlot({ slotIdx, team, activeIdx, move, ko, onSetActive, onSetMove, onSetKO, side }) {
      // Only members with a name are selectable
      const namedMembers = useMemo(() =>
        team.map((p, i) => ({ p, i })).filter(({ p }) => p && p.name),
      [team]);

      // null/undefined → use "" so the select stays on the placeholder
      const selectVal = (activeIdx !== null && activeIdx !== undefined) ? String(activeIdx) : '';
      const activeMon = (selectVal !== '') ? team[parseInt(selectVal)] : null;

      // Available moves from the selected slot's entries
      const availableMoves = useMemo(() =>
        activeMon ? (activeMon.moves || []).filter(m => m && m.trim()) : [],
      [activeMon]);

      const isMine = side === 'my';
      const accentColor = isMine ? 'rgba(99,102,241,0.2)' : 'rgba(245,158,11,0.2)';
      const accentBorder = isMine ? 'rgba(99,102,241,0.2)' : 'rgba(245,158,11,0.2)';

      return (
        <div style={{marginBottom:8, padding:6, background:'#0f0f0f', borderRadius:4, border:`1px solid ${accentBorder}`}}>
          <div style={{fontSize:'0.65rem', color:'#64748b', marginBottom:3}}>Slot {slotIdx+1}</div>
          {/* Pokémon selector row */}
          <div style={{display:'flex', gap:5, alignItems:'center', marginBottom:4}}>
            <TrackerSprite name={activeMon?.name || ''} size={26} />
            <select
              value={selectVal}
              onChange={e => {
                const v = e.target.value;
                onSetActive(v === '' ? null : parseInt(v));
                onSetMove(''); // reset move when Pokémon changes
              }}
              style={{flex:1, padding:'3px 4px', background:'#1a1a1a', border:`1px solid ${accentColor}`, color: selectVal ? '#f1f5f9' : '#4b5563', borderRadius:4, fontSize:'0.65rem'}}
            >
              <option value="">— select —</option>
              {namedMembers.map(({ p, i }) => (
                <option key={i} value={i}>{p.name}</option>
              ))}
            </select>
            <button onClick={() => onSetKO(!ko)}
              style={{padding:'2px 5px', background: ko ? 'rgba(220,38,38,0.65)' : (activeMon ? accentColor : 'rgba(255,255,255,0.05)'), color: ko ? '#f87171' : (activeMon ? (isMine ? '#a5b4fc' : '#fbbf24') : '#374151'), border:'none', borderRadius:3, cursor:'pointer', fontSize:'0.65rem', flexShrink:0}}>
              {ko ? '✕' : '●'}
            </button>
          </div>
          {/* Move dropdown — only from the selected Pokémon's moves */}
          <select
            value={move || ''}
            onChange={e => onSetMove(e.target.value)}
            disabled={!activeMon}
            style={{width:'100%', padding:'2px 4px', background:'#0f0f0f', border:'1px solid rgba(255,255,255,0.06)', color: activeMon ? '#94a3b8' : '#374151', borderRadius:3, fontSize:'0.65rem'}}
          >
            <option value="">— move —</option>
            {availableMoves.map((m, i) => (
              <option key={i} value={m}>{m}</option>
            ))}
          </select>
        </div>
      );
    }

    function TurnCard({ turn, myTeam, foeTeam, mode, onUpdate, onRemove }) {
      const numSlots = mode === 'doubles' ? 2 : 1;

      return (
        <div className="card p-3 rounded" style={{marginBottom:'16px'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'12px'}}>
            <span style={{fontSize:'0.8rem', fontWeight:'bold'}}>Turn {turn.id}</span>
            <button onClick={() => onRemove()} className="btn-danger" style={{padding:'2px 6px'}}>×</button>
          </div>

          <div style={{display:'grid', gridTemplateColumns:'1fr 20px 1fr', gap:'12px', marginBottom:'12px'}}>
            <div style={{background:'#0f0f0f', padding:'8px', borderRadius:'4px'}}>
              <div style={{fontSize:'0.7rem', fontWeight:'bold', color:'#a5b4fc', marginBottom:'6px'}}>My Active</div>
              {[0, ...(numSlots > 1 ? [1] : [])].map(i => (
                <ActiveSlot key={i} slotIdx={i} team={myTeam} activeIdx={turn.activeMy[i]} move={turn.movesMy[i]} ko={turn.koMy[i]} onSetActive={idx => { const t={...turn}; t.activeMy[i]=idx; onUpdate(t); }} onSetMove={m => { const t={...turn}; t.movesMy[i]=m; onUpdate(t); }} onSetKO={k => { const t={...turn}; t.koMy[i]=k; onUpdate(t); }} side="my" />
              ))}
            </div>

            <div style={{display:'flex', alignItems:'center', justifyContent:'center', color:'#4b5563'}}>vs</div>

            <div style={{background:'#0f0f0f', padding:'8px', borderRadius:'4px'}}>
              <div style={{fontSize:'0.7rem', fontWeight:'bold', color:'#a5b4fc', marginBottom:'6px'}}>Foe Active</div>
              {[0, ...(numSlots > 1 ? [1] : [])].map(i => (
                <ActiveSlot key={i} slotIdx={i} team={foeTeam} activeIdx={turn.activeFoe[i]} move={turn.movesFoe[i]} ko={turn.koFoe[i]} onSetActive={idx => { const t={...turn}; t.activeFoe[i]=idx; onUpdate(t); }} onSetMove={m => { const t={...turn}; t.movesFoe[i]=m; onUpdate(t); }} onSetKO={k => { const t={...turn}; t.koFoe[i]=k; onUpdate(t); }} side="foe" />
              ))}
            </div>
          </div>

          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginBottom:'8px'}}>
            <div style={{background:'#0f0f0f', padding:'6px', borderRadius:'4px'}}>
              <div style={{fontSize:'0.65rem', color:'#64748b', marginBottom:'4px'}}>Weather</div>
              <div style={{display:'flex', gap:'4px', flexWrap:'wrap'}}>
                {['sun', 'rain', 'sand', 'snow'].map(w => (
                  <button key={w} onClick={() => { const t={...turn}; t.weather = t.weather === w ? null : w; onUpdate(t); }} style={{padding:'2px 6px', background: turn.weather === w ? 'rgba(99,102,241,0.6)' : 'rgba(99,102,241,0.2)', border:'none', borderRadius:'3px', color:'white', cursor:'pointer', fontSize:'0.65rem'}}>
                    {w}
                  </button>
                ))}
              </div>
            </div>

            <div style={{background:'#0f0f0f', padding:'6px', borderRadius:'4px'}}>
              <div style={{fontSize:'0.65rem', color:'#64748b', marginBottom:'4px'}}>Field</div>
              <div style={{display:'flex', gap:'4px', flexWrap:'wrap'}}>
                <button onClick={() => { const t={...turn}; t.trickroom = !t.trickroom; onUpdate(t); }} style={{padding:'2px 6px', background: turn.trickroom ? 'rgba(99,102,241,0.6)' : 'rgba(99,102,241,0.2)', border:'none', borderRadius:'3px', color:'white', cursor:'pointer', fontSize:'0.65rem'}}>TR</button>
                {['misty', 'psychic', 'grassy', 'electric'].map(t => (
                  <button key={t} onClick={() => { const tr={...turn}; tr.terrain = tr.terrain === t ? null : t; onUpdate(tr); }} style={{padding:'2px 6px', background: turn.terrain === t ? 'rgba(99,102,241,0.6)' : 'rgba(99,102,241,0.2)', border:'none', borderRadius:'3px', color:'white', cursor:'pointer', fontSize:'0.65rem'}}>
                    {t}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div style={{background:'#0f0f0f', padding:'6px', borderRadius:'4px'}}>
            <div style={{fontSize:'0.65rem', color:'#64748b', marginBottom:'4px'}}>Screens</div>
            <div style={{display:'flex', gap:'4px', flexWrap:'wrap'}}>
              {['lightScreen', 'reflect', 'auroraVeil'].map(s => (
                <button key={s} onClick={() => { const t={...turn}; t[s] = !t[s]; onUpdate(t); }} style={{padding:'2px 6px', background: turn[s] ? 'rgba(99,102,241,0.6)' : 'rgba(99,102,241,0.2)', border:'none', borderRadius:'3px', color:'white', cursor:'pointer', fontSize:'0.65rem'}}>
                  {s === 'lightScreen' ? 'Light' : s === 'reflect' ? 'Reflect' : 'Aurora'}
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function TurnTrackerTab({ tbTeam, tbMoves, tbAbilities }) {
      const [mode, setMode] = useState('doubles');
      const [myTeam, setMyTeam] = useState(Array(6).fill(null).map(() => ({name:'', ability:'', moves:['','','',''], ko:false})));
      const [foeTeam, setFoeTeam] = useState(Array(6).fill(null).map(() => ({name:'', ability:'', moves:['','','',''], ko:false})));
      const [turns, setTurns] = useState([]);

      const emptyPoke = () => ({name:'', ability:'', moves:['','','',''], ko:false});
      const emptyTurn = (id) => ({
        id, activeMy:[0, 1], activeFoe:[0, 1], movesMy:['',''], movesFoe:['',''],
        koMy:[false, false], koFoe:[false, false],
        weather: null, trickroom: false, terrain: null,
        lightScreen: false, reflect: false, auroraVeil: false
      });

      useEffect(() => {
        if (turns.length === 0) setTurns([emptyTurn(1)]);
      }, []);

      const importFromTeambuilder = () => {
        const newMyTeam = [...myTeam];
        tbTeam.forEach((mon, idx) => {
          if (mon) {
            newMyTeam[idx] = {
              name: mon.name,
              ability: tbAbilities[idx] || '',
              moves: tbMoves[idx] || ['','','',''],
              ko: false
            };
          }
        });
        setMyTeam(newMyTeam);
      };

      const addTurn = () => {
        const lastTurn = turns.length > 0 ? turns[turns.length-1] : null;
        const newTurn = emptyTurn(Math.max(...turns.map(t => t.id), 0) + 1);
        if (lastTurn) {
          newTurn.weather = lastTurn.weather;
          newTurn.trickroom = lastTurn.trickroom;
          newTurn.terrain = lastTurn.terrain;
          newTurn.lightScreen = lastTurn.lightScreen;
          newTurn.reflect = lastTurn.reflect;
          newTurn.auroraVeil = lastTurn.auroraVeil;
        }
        setTurns([...turns, newTurn]);
      };

      const exportCSV = () => {
        const rows = [['Turn','My1','My1_Move','My1_KO','My2','My2_Move','My2_KO','Foe1','Foe1_Move','Foe1_KO','Foe2','Foe2_Move','Foe2_KO','Weather','TrickRoom','Terrain','LightScreen','Reflect','AuroraVeil']];
        turns.forEach(t => {
          rows.push([
            t.id,
            t.activeMy[0] !== undefined ? myTeam[t.activeMy[0]]?.name || '' : '',
            t.movesMy[0] || '',
            t.koMy[0] ? 'Y' : '',
            t.activeMy[1] !== undefined ? myTeam[t.activeMy[1]]?.name || '' : '',
            t.movesMy[1] || '',
            t.koMy[1] ? 'Y' : '',
            t.activeFoe[0] !== undefined ? foeTeam[t.activeFoe[0]]?.name || '' : '',
            t.movesFoe[0] || '',
            t.koFoe[0] ? 'Y' : '',
            t.activeFoe[1] !== undefined ? foeTeam[t.activeFoe[1]]?.name || '' : '',
            t.movesFoe[1] || '',
            t.koFoe[1] ? 'Y' : '',
            t.weather || '',
            t.trickroom ? 'Y' : '',
            t.terrain || '',
            t.lightScreen ? 'Y' : '',
            t.reflect ? 'Y' : '',
            t.auroraVeil ? 'Y' : ''
          ]);
        });
        const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'turn-tracker.csv';
        a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div style={{width:'100%', padding:'16px', background:'#0a0a0a'}}>
          <div style={{display:'flex', gap:'8px', marginBottom:'16px', flexWrap:'wrap'}}>
            {['singles', 'doubles'].map(m => (
              <button key={m} onClick={() => setMode(m)} style={{padding:'6px 12px', background: mode === m ? '#6366f1' : '#374151', color:'white', border:'none', borderRadius:'4px', cursor:'pointer', fontSize:'0.8rem', fontWeight:'bold'}}>
                {m}
              </button>
            ))}
            <button onClick={importFromTeambuilder} style={{padding:'6px 12px', background:'#6366f1', color:'white', border:'none', borderRadius:'4px', cursor:'pointer', fontSize:'0.8rem'}}>Import Team</button>
            <button onClick={() => setTurns([emptyTurn(1)])} style={{padding:'6px 12px', background:'#dc2626', color:'white', border:'none', borderRadius:'4px', cursor:'pointer', fontSize:'0.8rem'}}>Reset Turns</button>
            <button onClick={() => { setMyTeam(Array(6).fill(null).map(() => emptyPoke())); setFoeTeam(Array(6).fill(null).map(() => emptyPoke())); setTurns([emptyTurn(1)]); }} style={{padding:'6px 12px', background:'#dc2626', color:'white', border:'none', borderRadius:'4px', cursor:'pointer', fontSize:'0.8rem'}}>Reset All</button>
            <button onClick={exportCSV} style={{padding:'6px 12px', background:'#059669', color:'white', border:'none', borderRadius:'4px', cursor:'pointer', fontSize:'0.8rem'}}>Export CSV</button>
          </div>

          <div style={{display:'grid', gridTemplateColumns:'200px 1fr 200px', gap:'16px'}}>
            <div className="tracker-panel" style={{background:'#141414', border:'1px solid rgba(255,255,255,0.07)', borderRadius:'8px', padding:'12px'}}>
              <div style={{fontSize:'0.8rem', fontWeight:'bold', color:'#a5b4fc', marginBottom:'8px'}}>My Team</div>
              {myTeam.map((entry, idx) => (
                <TrackerPokeSlot key={idx} entry={entry} onUpdate={e => { const t=[...myTeam]; t[idx]=e; setMyTeam(t); }} onRemove={() => { const t=[...myTeam]; t[idx]=emptyPoke(); setMyTeam(t); }} />
              ))}
            </div>

            <div className="turns-col" style={{background:'#141414', border:'1px solid rgba(255,255,255,0.07)', borderRadius:'8px', padding:'12px'}}>
              <div style={{fontSize:'0.8rem', fontWeight:'bold', color:'#a5b4fc', marginBottom:'8px'}}>Turns</div>
              {turns.map(t => (
                <TurnCard key={t.id} turn={t} myTeam={myTeam} foeTeam={foeTeam} mode={mode} onUpdate={updated => { const idx=turns.findIndex(x=>x.id===t.id); if(idx!==-1){const nt=[...turns]; nt[idx]=updated; setTurns(nt);} }} onRemove={() => { if(turns.length>1) setTurns(turns.filter(x=>x.id!==t.id)); }} />
              ))}
              <button onClick={addTurn} style={{width:'100%', padding:'8px', background:'#6366f1', color:'white', border:'none', borderRadius:'4px', cursor:'pointer', fontSize:'0.8rem', fontWeight:'bold'}}>+ Add Turn</button>
            </div>

            <div className="tracker-panel" style={{background:'#141414', border:'1px solid rgba(255,255,255,0.07)', borderRadius:'8px', padding:'12px'}}>
              <div style={{fontSize:'0.8rem', fontWeight:'bold', color:'#a5b4fc', marginBottom:'8px'}}>Foe Team</div>
              {foeTeam.map((entry, idx) => (
                <TrackerPokeSlot key={idx} entry={entry} onUpdate={e => { const t=[...foeTeam]; t[idx]=e; setFoeTeam(t); }} onRemove={() => { const t=[...foeTeam]; t[idx]=emptyPoke(); setFoeTeam(t); }} />
              ))}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab] = useState("roster");
      const [team, setTeam] = useState([null,null,null,null,null,null]);
      const [moveSelectors, setMoveSelectors] = useState(Array(6).fill(null).map(() => ['','','','']));
      const [abilitySelectors, setAbilitySelectors] = useState(Array(6).fill(''));
      const [tooltipData, setTooltipData] = useState(null);

      const handleHoverPokemon = useCallback((pokemon, event) => {
        if (pokemon && event) {
          setTooltipData({ pokemon, mousePos: { x: event.clientX, y: event.clientY } });
        } else {
          setTooltipData(null);
        }
      }, []);

      const handleAddToTeam = useCallback((pokemon) => {
        if (team.some(p => p && p.slug === pokemon.slug)) return;
        const idx = team.findIndex(p => !p);
        if (idx !== -1) {
          const t = [...team]; t[idx] = pokemon; setTeam(t);
        }
      }, [team]);

      const tabs = [
        { id: 'roster', label: 'Roster' },
        { id: 'teambuilder', label: 'Teambuilder' },
        { id: 'items', label: 'Items' },
        { id: 'synergies', label: 'Synergies' },
        { id: 'tracker', label: 'Turn Tracker' },
      ];

      return (
        <div className="min-h-screen" style={{backgroundColor:'#0a0a0a'}}>
          <header style={{backgroundColor:'#111111',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
            <div className="max-w-7xl mx-auto px-4 py-3 flex flex-wrap justify-between items-center gap-3">
              <div>
                <h1 className="text-2xl font-bold" style={{color:'#a5b4fc',letterSpacing:'-0.02em'}}>Champions DB</h1>
                <div className="text-xs" style={{color:'#4b5563'}}>Regulation M-A · April – June 2026</div>
              </div>
              <nav className="flex gap-2">
                {tabs.map(t => (
                  <button key={t.id} onClick={() => setActiveTab(t.id)}
                    className={`px-3 py-1.5 rounded text-sm font-semibold transition-all ${activeTab===t.id ? 'tab-active' : 'bg-gray-800 text-gray-300 hover:bg-gray-700'}`}>
                    {t.label}
                  </button>
                ))}
              </nav>
              <div className="text-xs px-2 py-1 rounded font-semibold" style={{background:'rgba(99,102,241,0.2)',color:'#a5b4fc',border:'1px solid rgba(99,102,241,0.3)'}}>
                {team.filter(Boolean).length}/6
              </div>
            </div>
            <div className="max-w-7xl mx-auto px-4 pb-2 flex gap-1.5 items-center">
              <span className="text-xs mr-1" style={{color:'#374151'}}>Team:</span>
              {team.map((mon, idx) => (
                <div key={idx} className="w-8 h-8 rounded flex items-center justify-center" style={{background:'#1a1a1a',border:'1px solid rgba(255,255,255,0.06)'}}>
                  {mon
                    ? <img src={getSpriteUrl(mon)} alt={mon.name} className="w-8 h-8 object-contain" loading="lazy" title={mon.name} />
                    : <span style={{color:'#2d3748',fontSize:'0.7rem'}}>·</span>
                  }
                </div>
              ))}
            </div>
          </header>

          <main style={{backgroundColor:'#0a0a0a'}}>
            {activeTab==='roster' && <div className="max-w-7xl mx-auto px-4 py-6"><RosterTab team={team} onAddToTeam={handleAddToTeam} onHoverPokemon={handleHoverPokemon} tooltipData={tooltipData} /></div>}
            {activeTab==='teambuilder' && <div className="max-w-7xl mx-auto px-4 py-6"><TeambuilderTab team={team} setTeam={setTeam} onHoverPokemon={handleHoverPokemon} tooltipData={tooltipData} moveSelectors={moveSelectors} setMoveSelectors={setMoveSelectors} abilitySelectors={abilitySelectors} setAbilitySelectors={setAbilitySelectors} /></div>}
            {activeTab==='items' && <div className="max-w-7xl mx-auto px-4 py-6"><ItemsTab /></div>}
            {activeTab==='synergies' && <div className="max-w-7xl mx-auto px-4 py-6"><SynergiesTab onHoverPokemon={handleHoverPokemon} tooltipData={tooltipData} /></div>}
            {activeTab==='tracker' && <TurnTrackerTab tbTeam={team} tbMoves={moveSelectors} tbAbilities={abilitySelectors} />}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
